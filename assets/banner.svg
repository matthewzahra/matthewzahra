<svg
    width="1200"
    height="350"
    viewBox="0 0 1200 350"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:xlink="http://www.w3.org/1999/xlink">

<defs>

    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0D1117"/>
        <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>

    <clipPath id="profileClip">
        <circle cx="200" cy="175" r="105"/>
    </clipPath>

</defs>


<!-- Background -->
<rect
    width="1200"
    height="350"
    rx="24"
    fill="url(#bg)"/>


<!-- Border -->
<rect
    x="1"
    y="1"
    width="1198"
    height="348"
    rx="24"
    fill="none"
    stroke="#30363D"/>


<!-- Profile image -->

<image
    href="https://raw.githubusercontent.com/matthewzahra/matthewzahra/main/assets/profile.jpeg"
    xlink:href="https://raw.githubusercontent.com/matthewzahra/matthewzahra/main/assets/profile.jpeg"
    x="95"
    y="70"
    width="210"
    height="210"
    clip-path="url(#profileClip)"
    preserveAspectRatio="xMidYMid slice"/>


<circle
    cx="200"
    cy="175"
    r="105"
    fill="none"
    stroke="#58A6FF"
    stroke-width="5"/>



<!-- Terminal window -->

<rect
    x="430"
    y="45"
    width="650"
    height="260"
    rx="14"
    fill="#010409"
    stroke="#30363D"/>


<!-- Terminal header -->

<circle cx="460" cy="75" r="7" fill="#ff5f56"/>
<circle cx="485" cy="75" r="7" fill="#ffbd2e"/>
<circle cx="510" cy="75" r="7" fill="#27c93f"/>


<!-- Terminal text -->

<text
    x="460"
    y="125"
    font-family="JetBrains Mono, monospace"
    font-size="22"
    fill="#58A6FF">
    matthewzahra@github:~$ whoami
</text>


<text
    x="460"
    y="160"
    font-family="JetBrains Mono, monospace"
    font-size="22"
    fill="#F0F6FC">
    Matthew Zahra
</text>


<text
    x="460"
    y="205"
    font-family="JetBrains Mono, monospace"
    font-size="22"
    fill="#58A6FF">
    matthewzahra@github:~$ education
</text>


<text
    x="460"
    y="240"
    font-family="JetBrains Mono, monospace"
    font-size="22"
    fill="#F0F6FC">
    University of Oxford - Computer Science
</text>


<text
    x="460"
    y="285"
    font-family="JetBrains Mono, monospace"
    font-size="22"
    fill="#58A6FF">
    matthewzahra@github:~$
</text>


</svg>